name: Feature request
description: Suggest an idea for WordMeaning
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that WordMeaning doesn't help with yet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
  - type: markdown
    attributes:
      value: >
        Note: WordMeaning aims to stay small and reliable. Larger features
        (offline dictionaries, OCR, multi-language) are best discussed in an
        issue before a big pull request.
